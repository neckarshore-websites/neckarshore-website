# Dependabot — keeps the SHA-pinned actions and npm deps current.
# #270 estate standard, §3 control 3. Two ecosystems: the npm manifest at the
# repo root and the GitHub Actions pinned in .github/workflows/.
#
# The github-actions updater rewrites the pinned SHAs (and their `# vX`
# comments) to the newest release, so the Pinned-Deps hardening stays fresh
# instead of rotting at today's commit.
version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
    groups:
      # One PR for the low-risk minor/patch churn; majors stay separate so a
      # breaking bump (e.g. next) gets its own reviewable PR.
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
    groups:
      github-actions:
        patterns:
          - "*"
