# Dependabot — keeps the SHA-pinned actions and npm deps current.
# #270 estate standard, §3 control 3. Two ecosystems: the npm manifest at the
# repo root and the GitHub Actions pinned in .github/workflows/.
#
# The github-actions updater rewrites the pinned SHAs (and their `# vX`
# comments) to the newest release, so the Pinned-Deps hardening stays fresh
# instead of rotting at today's commit.
version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
    groups:
      # Grouping is aligned with the auto-merge safe class (dependabot-auto-merge.yml)
      # so the boring class self-clears atomically and only the review-worthy bumps
      # surface individually:
      #   - npm-development: dev deps, minor+patch  -> auto (minor&&dev, or patch)
      #   - npm-production:  prod deps, patch only   -> auto (patch)
      #   - runtime minor (prod, minor): ungrouped -> individual PR -> MANUAL
      #   - any major:                   ungrouped -> individual PR -> MANUAL
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch
      npm-production:
        dependency-type: production
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
    groups:
      # Non-major actions bumps batch into one auto-mergeable PR; an actions MAJOR
      # stays ungrouped so it surfaces individually for review.
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
