name: CodeQL

# Static analysis (SAST) for the site's own TypeScript/JavaScript source.
# Public-repo supply-chain hardening — #270 estate standard, §3 control 4.
#
# Language: javascript-typescript ONLY. The single Python file in the repo
# (scripts/subset-fonts.py) is a standalone build-time tooling script, not
# analyzable application source — so `python` is intentionally NOT added
# (dispatch §2c / §2a "owner's build-time call").
#
# `languages:` is PLURAL on codeql-action/init — the singular `language:` is
# silently ignored and analyzes nothing (#270 §1.3, pilot-caught).
#
# build-mode: none — js/ts is interpreted, no compilation step to trace.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 03:17 UTC — off the top-of-hour free-tier congestion and
    # off the other crons (update-stats 04:00, lighthouse 06:00, link 07:00).
    - cron: "17 3 * * 1"

# Least-privilege default; the analyze job re-declares what it needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Job-scoped write — the SARIF upload needs security-events:write; nothing
    # else does. Job-level permissions REPLACE the workflow default, so
    # contents:read is restated here (#270 §1.3).
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
