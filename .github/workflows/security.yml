name: Security Audit

# Supply-chain CVE gate — #270 estate standard, §3 control 7.
#
# Truth source for "what is actionable" is `npm audit` in the manifest dir,
# NOT the scorecard OSV count and NOT the Dependabot alert count (#270 §1.5,
# the believe-the-ground lesson). The gate fails the build on any HIGH or
# CRITICAL advisory in the resolved dependency tree; moderate/low are visible
# in the log but do not block (they track upstream framework majors we do not
# bump on a security cadence).
#
# The weekly schedule re-runs the gate against the CURRENTLY pinned tree, so a
# newly-disclosed CVE against a dep we already ship opens a red run even with
# no code change.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 03:37 UTC — distinct minute, off the other crons.
    - cron: "37 3 * * 1"

# Least-privilege — read-only.
permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (fail on high or critical)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (locked)
        run: npm ci

      - name: Audit — fail on high or critical
        run: npm audit --audit-level=high
