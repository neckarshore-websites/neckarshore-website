# Strict ESLint gate — fails the build on any warning OR error.
# Catches drift before it reaches main (was a recurring source of stale
# warnings, see L-RETRO-R3, planning reports 2026-05-14).
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token — this workflow only reads the repo.
permissions:
  contents: read

jobs:
  lint:
    name: ESLint (strict, zero warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint with strict gate
        run: npm run lint -- --max-warnings 0
