# Strict ESLint gate — fails the build on any warning OR error.
# Catches drift before it reaches main (was a recurring source of stale
# warnings, see L-RETRO-R3, planning reports 2026-05-14).
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint (strict, zero warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint with strict gate
        run: npm run lint -- --max-warnings 0
