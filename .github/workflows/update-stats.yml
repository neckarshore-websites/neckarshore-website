name: Update Stats

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC = 05:00 CET (06:00 CEST in summer)
  workflow_dispatch: # manual trigger for testing

# Serialize runs so an overlapping schedule+dispatch can't race the read-modify-write of the
# committed stats artifacts (public/stats.json, estate-test-scope*.json, repositories.json,
# estate-test-scope-history.jsonl) into a non-fast-forward push. cancel-in-progress:false — never
# interrupt an in-flight commit/push; the later run waits, then checks out the earlier run's pushed
# result and upserts on top (idempotent per date). (CodeRabbit #106)
concurrency:
  group: update-stats
  cancel-in-progress: false

# Least-privilege default token — read-only at the top level. The one job
# that writes (commit + push of the stats artifacts) re-declares the write it
# needs at job scope (#270 §1.3: job-scope the write, never workflow-scope).
permissions:
  contents: read

jobs:
  update-stats:
    runs-on: ubuntu-latest
    # Job-scoped write — this job commits public/stats.json + the two rollups
    # back to main. The actual push authenticates via secrets.STATS_PAT (set on
    # checkout); contents:write is kept here as the correct least-privilege
    # scope for a commit-and-push job (#89/#96/#97 pipeline — do NOT downgrade).
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ secrets.STATS_PAT }}

      - name: Install cloc
        run: sudo apt-get install -y cloc

      - name: Collect stats
        env:
          STATS_PAT: ${{ secrets.STATS_PAT }}
        run: |
          set -euo pipefail

          CONFIG=$(cat stats-config.json)
          START_DATE=$(echo "$CONFIG" | jq -r '.startDate')
          REPO_COUNT=$(echo "$CONFIG" | jq '.repos | length')

          # Days since first commit
          START_EPOCH=$(date -d "$START_DATE" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS=$(( (NOW_EPOCH - START_EPOCH) / 86400 ))

          TOTAL_LOC=0
          TOTAL_COMMITS=0

          mkdir -p /tmp/repos
          mkdir -p /tmp/stats
          : > /tmp/repos_meta.jsonl   # repository-inventory accumulator (#7 /repositories) — PUBLIC repos only
          : > /tmp/public_slugs.txt   # owner/name of every LIVE-public repo — feeds the test-scope withholder (#525)
          PRIVATE_COUNT=0            # private repos contribute to an aggregate count, never by name

          for i in $(seq 0 $((REPO_COUNT - 1))); do
            OWNER=$(echo "$CONFIG" | jq -r ".repos[$i].owner")
            NAME=$(echo "$CONFIG" | jq -r ".repos[$i].name")
            PRIVATE=$(echo "$CONFIG" | jq -r ".repos[$i].private")
            REPO="${OWNER}/${NAME}"

            echo "--- Processing ${REPO} ---"

            # Clone (shallow) for LoC count
            CLONE_URL="https://github.com/${REPO}.git"
            if [ "$PRIVATE" = "true" ]; then
              CLONE_URL="https://x-access-token:${STATS_PAT}@github.com/${REPO}.git"
            fi
            git clone --depth 1 --quiet "$CLONE_URL" "/tmp/repos/${NAME}" 2>/dev/null || {
              echo "  WARN: clone failed for ${REPO}, skipping LoC"
            }

            if [ -d "/tmp/repos/${NAME}" ]; then
              LOC=$(cloc "/tmp/repos/${NAME}" --json 2>/dev/null | jq '.SUM.code // 0' 2>/dev/null || echo 0)
              echo "  LoC: ${LOC}"
              TOTAL_LOC=$((TOTAL_LOC + LOC))
            fi

            # Commits via GitHub API (contributors endpoint sums all contributions).
            # -L follows the 301 a renamed/org-moved repo returns; without it the
            # body is empty and the repo silently counts as 0 commits.
            COMMITS=$(curl -sfL \
              -H "Authorization: Bearer ${STATS_PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/contributors?per_page=100&anon=true" \
              | jq '[.[].contributions] | add // 0' 2>/dev/null || echo 0)
            echo "  Commits: ${COMMITS}"
            if [ "${COMMITS}" -eq 0 ]; then
              echo "  WARN: ${REPO} returned 0 commits — repo renamed/moved (stale stats-config.json) or token lacks access?"
            fi
            TOTAL_COMMITS=$((TOTAL_COMMITS + COMMITS))

            # If this repo declares a statsPath, fetch its stats.json into /tmp/stats for the
            # estate test-scope aggregator. The raw Accept header is mandatory — WITHOUT it the
            # contents API returns a base64 envelope (.content/.encoding), the aggregator reads
            # no numeric .tests.total, and the producer collapses to 0 + a false "missing".
            #
            # Optional statsRef: a public+protected producer cannot push stats.json to its
            # protected main (a bot push is rejected without weakening main's protection), so it
            # publishes to a dedicated UNPROTECTED data branch instead. When statsRef is set we
            # fetch from that branch via ?ref=; when it is absent the contents API defaults to the
            # repo's default branch — so every existing producer (md-viewer, clearpath, backend)
            # is unchanged. First public+protected producer: neckarshore-mmps/trustscope → stats-data.
            STATS_PATH=$(echo "$CONFIG" | jq -r ".repos[$i].statsPath // empty")
            if [ -n "$STATS_PATH" ]; then
              STATS_REF=$(echo "$CONFIG" | jq -r ".repos[$i].statsRef // empty")
              STATS_URL="https://api.github.com/repos/${REPO}/contents/${STATS_PATH}"
              [ -n "$STATS_REF" ] && STATS_URL="${STATS_URL}?ref=${STATS_REF}"
              if curl -sfL \
                -H "Authorization: Bearer ${STATS_PAT}" \
                -H "Accept: application/vnd.github.v3.raw" \
                "$STATS_URL" \
                -o "/tmp/stats/${OWNER}__${NAME}.json" 2>/dev/null; then
                echo "  Stats: fetched ${STATS_PATH}${STATS_REF:+ @ref=$STATS_REF}"
              else
                echo "  WARN: ${REPO} statsPath ${STATS_PATH}${STATS_REF:+ @ref=$STATS_REF} fetch failed — counts as a missing producer"
              fi
            fi

            # Repository inventory (#7 /repositories) — PUBLIC-ONLY at the source (Founder
            # 2026-06-30, overrides the earlier hybrid that named private repos). public/
            # repositories.json is itself a PUBLIC asset, so a private repo's NAME there leaks
            # regardless of how the page renders it — "withhold at the source, not the render"
            # (the same lesson already applied to descriptions). A PRIVATE repo therefore
            # contributes ONLY to an aggregate count; its name/visibility/description never
            # enter the file. Visibility is the LIVE GitHub value (not the stats-config flag,
            # which is only for clone auth and can be stale). Fail-safe: a failed/empty fetch
            # has .private != "false" → counted private, name withheld (never a named leak).
            META=$(curl -sfL \
              -H "Authorization: Bearer ${STATS_PAT}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}" 2>/dev/null || echo '{}')
            if [ "$(echo "$META" | jq -r '.private')" = "false" ]; then
              DESC=$(echo "$META" | jq -r '.description // ""')
              jq -cn --arg o "$OWNER" --arg n "$NAME" --arg d "$DESC" \
                '{owner:$o, name:$n, visibility:"public", description:$d}' >> /tmp/repos_meta.jsonl
              printf '%s\n' "$REPO" >> /tmp/public_slugs.txt   # same LIVE-public signal → test-scope withholder (#525)
            else
              PRIVATE_COUNT=$((PRIVATE_COUNT + 1))
            fi
          done

          # --- Estate test-scope rollup ---
          # Aggregate every producer's fetched stats.json via the unit-tested pure aggregator
          # (scripts/aggregate-test-scope.sh). No-double-count: byType additive, lenses excluded.
          # Fail-closed-visible: a declared producer whose file is missing → 0 + WARN + missing[].
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PREV=$(cat public/stats.json 2>/dev/null || echo '{}')

          # Pass the committed floor seed (estate-test-scope-seed.json) as the 3rd arg so repos
          # that don't yet self-report still contribute to the PUBLIC estate count (backlog #244).
          # Live producers win by slug → no double-count; the number auto-corrects as repos
          # self-report. The seed also carries `audited_floor` (Founder directive 2026-07-10):
          # total = max(live+seed sum, audited_floor.total) — the tile shows the exact audited
          # estate figure while per-repo pipeline coverage catches up; self-retiring once the
          # organic sum passes it (aggregate-test-scope.sh emits `applied` provenance).
          TEST_SCOPE=$(bash scripts/aggregate-test-scope.sh stats-config.json /tmp/stats estate-test-scope-seed.json)

          # Apply the disclosure allow-list at the SOURCE (#525 → Pass-2a disclosure-config wiring).
          # The aggregator keeps real owner/name slugs so its live-wins-by-slug dedup works; here the
          # 3-way withhold decides each slug-bearing field (per_repo[].repo + missing[]): approved
          # private products → product name, public repos → their slug, everything else private →
          # "privates Repo". Done BEFORE any echo/use of $TEST_SCOPE so no withheld private name
          # reaches the (publicly viewable) Actions log, the committed public/estate-test-scope.json,
          # OR public/stats.json (which carries .missing via the subset). Counts/byType + the
          # top-level total are untouched → the honest headline math is preserved.
          #
          # named_set = LIVE public ∪ named_private (public stays named by default per the Founder
          # decision; named_private is the ONLY private addition). Fail-safe: a private slug NOT in
          # named_private never enters the named set → stays "privates Repo". disclosure-config.json
          # is the review-gated, committed copy of the private planning matrix `disclosure` block
          # (planning is private → never read cross-repo at CI time). Regen: npm run sync:disclosure-config.
          LIVE_PUBLIC_JSON=$(sort -u /tmp/public_slugs.txt | jq -R . | jq -s -c .)
          NAMED_PRIVATE_JSON=$(jq -c '.named_private' disclosure-config.json)
          DISPLAY_OVERRIDES_JSON=$(jq -c '.display_overrides' disclosure-config.json)
          NAMED_SET_JSON=$(jq -cn --argjson pub "$LIVE_PUBLIC_JSON" --argjson np "$NAMED_PRIVATE_JSON" '($pub + $np) | unique')
          TEST_SCOPE=$(printf '%s' "$TEST_SCOPE" \
            | bash scripts/withhold-private-repos.sh "$NAMED_SET_JSON" "$DISPLAY_OVERRIDES_JSON" "$NAMED_PRIVATE_JSON")

          echo "--- estate test-scope (private names withheld) ---"
          echo "$TEST_SCOPE" | jq .

          TESTS=$(echo "$TEST_SCOPE" | jq '.total')
          ENDPOINTS=$(echo "$TEST_SCOPE" | jq '.endpoints')
          REPORTING=$(echo "$TEST_SCOPE" | jq '.reporting')
          EXPECTED=$(echo "$TEST_SCOPE" | jq '.expected')
          # repos (estate count) + floor drive the public tile (#244); kept alongside the
          # internal reporting/expected provenance fields. audited_floor (no slugs — TC-CNT-083's
          # two-slug-field assumption holds) rides along so stats.json carries the same headline
          # provenance as estate-test-scope.json; jq emits null when the seed has none.
          TEST_SCOPE_SUBSET=$(echo "$TEST_SCOPE" | jq '{total, byType, reporting, expected, missing, repos, floor, audited_floor}')
          # `unstamped` is a TRANSIENT pipeline field (drives the stderr WARN + the job summary,
          # which read the in-memory $TEST_SCOPE) — it is deliberately NOT persisted to the served
          # artifact. Stripping it keeps the served schema unchanged AND keeps per_repo[].repo +
          # missing[] the ONLY slug-bearing fields (TC-CNT-083's privacy scan assumes exactly those
          # two; a third served slug-bearing array would be an unscanned leak vector).
          ESTATE_OUT=$(echo "$TEST_SCOPE" | jq --arg u "$NOW" 'del(.unstamped) + {updatedAt: $u}')

          if [ "$REPORTING" -lt "$EXPECTED" ]; then
            echo "WARN: only ${REPORTING}/${EXPECTED} stats producers reported — missing: $(echo "$TEST_SCOPE" | jq -c '.missing')"
          fi

          # --- SHA-stamp coverage → WARN + job summary (Test Charter: auditable, SHA-stamped) ---
          # $TEST_SCOPE is the WITHHELD object here → its .unstamped[] is already privacy-mapped by
          # withhold-private-repos.sh (a private un-stamped repo → "privates Repo"), so the persistent
          # (public) job summary can never carry a raw private slug. WARN-ONLY, never fail — the
          # `{ ...; } || true` wrapper keeps a jq/redirect hiccup from aborting the stats publish under
          # `set -euo pipefail` (guardrail #244 — the count must keep publishing).
          {
            UNSTAMPED_N=$(echo "$TEST_SCOPE" | jq '.unstamped | length' 2>/dev/null || echo 0)
            STAMPED_N=$(echo "$TEST_SCOPE" | jq '[.per_repo[] | select(.audited_sha != null)] | length' 2>/dev/null || echo 0)
            UNSTAMPED_LIST=$(echo "$TEST_SCOPE" | jq -r '.unstamped | join(", ")' 2>/dev/null || echo "?")
            if [ "${UNSTAMPED_N:-0}" -gt 0 ] 2>/dev/null; then
              echo "WARN: ${UNSTAMPED_N} estate row(s) carry audited_sha:null (un-stamped): ${UNSTAMPED_LIST}"
            fi
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              {
                echo "### Estate SHA-stamp coverage"
                echo ""
                echo "- ✅ stamped: **${STAMPED_N}**"
                echo "- ⚠️ un-stamped (audited_sha:null): **${UNSTAMPED_N}**"
                if [ "${UNSTAMPED_N:-0}" -gt 0 ] 2>/dev/null; then
                  echo "- offending: ${UNSTAMPED_LIST}"
                fi
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          } || true

          # Last-known-good floor: if the rollup totally collapses to 0 (an infra/token failure,
          # not a real "estate has 0 tests"), keep the previously published numbers + artifact
          # rather than zeroing the live homepage tile. Per-producer misses still surface above.
          # NOTE (#244): with the committed floor seed always contributing (≥2.023), TESTS can no
          # longer reach 0, so this branch is effectively dead — kept as defence in depth. A live
          # backend-fetch failure now degrades to the seed floor (2.611→2.023), still floor-honest.
          if [ "$TESTS" -eq 0 ]; then
            echo "WARN: estate test-scope rolled up to 0 — keeping last-known-good for both JSON outputs."
            TESTS=$(echo "$PREV" | jq '.tests // 0')
            ENDPOINTS=$(echo "$PREV" | jq '.endpoints // 0')
            TEST_SCOPE_SUBSET=$(echo "$PREV" | jq 'if .testScope then .testScope else {total: (.tests // 0), byType: {}, reporting: 0, expected: 0, missing: [], repos: 0, floor: false} end')
            if [ -f public/estate-test-scope.json ]; then ESTATE_OUT=$(cat public/estate-test-scope.json); fi
          fi

          echo ""
          echo "=== TOTALS ==="
          echo "Days: ${DAYS}"
          echo "Commits: ${TOTAL_COMMITS}"
          echo "Tests: ${TESTS}"
          echo "Endpoints: ${ENDPOINTS}"
          echo "LoC: ${TOTAL_LOC}"
          echo "Repos: ${REPO_COUNT}"

          # Write public/stats.json via jq (no user input, all values computed internally).
          # Top-level `tests` stays = testScope.total for backward-compat; the decomposed
          # `testScope` drives the new tile breakdown (Task 3).
          jq -n \
            --argjson days "$DAYS" \
            --argjson commits "$TOTAL_COMMITS" \
            --argjson tests "$TESTS" \
            --argjson endpoints "$ENDPOINTS" \
            --argjson linesOfCode "$TOTAL_LOC" \
            --argjson repos "$REPO_COUNT" \
            --argjson testScope "$TEST_SCOPE_SUBSET" \
            --arg updatedAt "$NOW" \
            '{days: $days, commits: $commits, tests: $tests, endpoints: $endpoints, linesOfCode: $linesOfCode, repos: $repos, testScope: $testScope, updatedAt: $updatedAt}' \
            > public/stats.json

          # Write public/estate-test-scope.json — the machine-readable rollup (full per-repo
          # breakdown + lenses) consumed by Plan 2's Obsidian renderer.
          printf '%s\n' "$ESTATE_OUT" > public/estate-test-scope.json

          # Write public/repositories.json — the inventory for the public /repositories page (#7).
          # PUBLIC-ONLY by construction: the accumulator holds only public repos (see the loop);
          # private repos are represented solely by the aggregate `privateCount`, never by name.
          # Sorted owner/name so the daily diff is stable (only real public-repo changes commit).
          jq -s --arg u "$NOW" --argjson pc "$PRIVATE_COUNT" \
            '{updatedAt: $u, privateCount: $pc, repos: (sort_by(.owner + "/" + .name))}' \
            /tmp/repos_meta.jsonl > public/repositories.json

          echo ""
          echo "=== public/stats.json ==="
          cat public/stats.json
          echo ""
          echo "=== public/estate-test-scope.json ==="
          cat public/estate-test-scope.json
          echo ""
          echo "=== public/repositories.json ==="
          cat public/repositories.json

      # --- Estate test-count history trendline (backlog #264, storage only — no UI yet) ---
      # Appends/upserts ONE row per date into public/estate-test-scope-history.jsonl. Runs AFTER the
      # withhold step above: it reads the POST-withhold public/estate-test-scope.json (display names
      # only), so no raw private slug can enter the served history file — the ordering IS the privacy
      # guarantee. Fail-OPEN (guardrail #244: the daily stats commit must keep publishing even if this
      # secondary appender hiccups); the script is unit-tested, so a real bug is caught at PR time, not
      # silently in prod. History cannot be backfilled — every skipped run is a lost datapoint.
      - name: Append test-scope history
        run: |
          node scripts/append-test-scope-history.mjs || echo "::warning::append-test-scope-history failed — history not updated this run (stats publish continues)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/stats.json public/estate-test-scope.json public/repositories.json public/estate-test-scope-history.jsonl
          if git diff --staged --quiet; then
            echo "No changes to stats — skipping commit"
          else
            git commit -m "chore: update daily stats"
            git push
          fi
