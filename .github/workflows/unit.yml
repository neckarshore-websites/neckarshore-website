# Unit-test gate — guards the estate test-scope aggregator (scripts/aggregate-test-scope.sh)
# via its pure dir-in → JSON-out unit tests. The aggregator is the "honest estate test number"
# logic (Charter Artifact 6); the no-double-count + fail-closed-visible rules must stay green
# on every PR. Scoped to tests/unit/ only — node --test, jq + bash preinstalled on the runner.
name: Unit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token — this workflow only reads the repo.
permissions:
  contents: read

jobs:
  unit:
    name: Node unit tests (tests/unit)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          npm run test:unit
          npm run test:lighthouse:unit
          # §4c: gate the previously-ungated pure unit suites. test:search:unit is now GREEN at
          # HEAD (12 passed, 30 docs) and exits non-zero on failure (process.exit(fail?1:0)), so
          # this is a real gate, not cosmetic. The old "currently RED — /repositories missing"
          # hold-out comment was stale (verified green 2026-07-16). Gating it makes the suite
          # CI-gated -> strict-additive at emit time when the self-report lands (closes #174-tail).
          npm run test:search:unit
