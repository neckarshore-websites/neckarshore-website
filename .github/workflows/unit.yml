# Unit-test gate — guards the estate test-scope aggregator (scripts/aggregate-test-scope.sh)
# via its pure dir-in → JSON-out unit tests. The aggregator is the "honest estate test number"
# logic (Charter Artifact 6); the no-double-count + fail-closed-visible rules must stay green
# on every PR. Scoped to tests/unit/ only — node --test, jq + bash preinstalled on the runner.
name: Unit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token — this workflow only reads the repo.
permissions:
  contents: read

jobs:
  unit:
    name: Node unit tests (tests/unit)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          npm run test:unit
          # §4c: gate the previously-ungated pure unit tests.
          # test:search:unit is held out (currently RED — a real search-index
          # bug, /repositories missing; tracked separately, not gated red).
          npm run test:lighthouse:unit
