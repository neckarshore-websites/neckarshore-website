name: Lighthouse Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches drift from CDN/dependency changes
    - cron: "0 6 * * 1"

jobs:
  lighthouse:
    name: Lighthouse (Desktop + Mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Start server
        run: npm run start &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run Lighthouse audit
        run: npm run lighthouse:quick

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouse/
          retention-days: 14
          include-hidden-files: true
