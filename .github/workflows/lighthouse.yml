name: Lighthouse Audit

on:
  # Manual fallback — the scheduled cron has proven unreliable on low-traffic
  # repos (3 of 4 sites' Monday crons never fired on 2026-06-01). Lets us
  # trigger an on-demand Lighthouse run via `gh workflow run lighthouse.yml`.
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches drift from CDN/dependency changes
    - cron: "0 6 * * 1"

# Least-privilege default token — this workflow only reads the repo (reports
# are uploaded as run artifacts, which needs no extra token scope).
permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse (Desktop + Mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Start server
        run: npm run start &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run Lighthouse audit
        run: npm run lighthouse:quick

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-reports
          path: .lighthouse/
          retention-days: 14
          include-hidden-files: true
